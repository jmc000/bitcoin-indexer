---
name: Continuous Integration

on:
  push:
    branches:
      - main
    paths:
      - 'src/bitcoin_indexer/*.py'
      - 'tests/*.py'
  pull_request:
    paths:
      - 'src/bitcoin_indexer/*.py'
      - 'tests/*.py'

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-26.04
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/workflows/setup-python-env

      - name: Run pylint
        run: pylint src/bitcoin_indexer
  
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-26.04
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/workflows/setup-python-env

      - name: Run pytest
        run: pytest tests/** -m "not integration"
